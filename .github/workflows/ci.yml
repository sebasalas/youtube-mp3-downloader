name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-gi gir1.2-gtk-3.0 libgirepository1.0-dev gobject-introspection libcairo2-dev pkg-config

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install flake8 mypy pytest
          pip install PyGObject

      - name: Lint with flake8
        run: |
          flake8 youtubemp3downloader/ tests/ --max-line-length=120 --exclude=__pycache__

      - name: Type check with mypy
        run: |
          mypy youtubemp3downloader/ --ignore-missing-imports --no-strict-optional

      - name: Run tests
        run: |
          pytest tests/ -v
